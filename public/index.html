<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Trade Engine SaaS Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans antialiased">

    <!-- Navbar -->
    <nav class="bg-indigo-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-white text-xl font-bold tracking-wider">🚀 B2B Trade Engine SaaS</span>
                </div>
                <div class="flex items-center">
                    <span class="text-indigo-200 text-sm">Production Ready</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white overflow-hidden shadow rounded-lg p-5 border-l-4 border-indigo-500">
                <dt class="text-sm font-medium text-gray-500 truncate">Total Trades</dt>
                <dd id="total-trades" class="mt-1 text-3xl font-semibold text-gray-900">0</dd>
            </div>
            <div class="bg-white overflow-hidden shadow rounded-lg p-5 border-l-4 border-green-500">
                <dt class="text-sm font-medium text-gray-500 truncate">Total Trade Value</dt>
                <dd id="total-value" class="mt-1 text-3xl font-semibold text-gray-900">$0.00</dd>
            </div>
            <div class="bg-white overflow-hidden shadow rounded-lg p-5 border-l-4 border-yellow-500">
                <dt class="text-sm font-medium text-gray-500 truncate">System Status</dt>
                <dd class="mt-1 text-3xl font-semibold text-green-600">Online</dd>
            </div>
        </div>

        <!-- Grid: Form & Table -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Add Trade Form -->
            <div class="bg-white shadow rounded-lg p-6 lg:col-span-1">
                <h2 class="text-lg font-medium text-gray-900 mb-4">Create New Trade</h2>
                <form id="trade-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Buyer Company</label>
                        <input type="text" id="buyer" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2" placeholder="e.g. Acme Corp">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Seller Company</label>
                        <input type="text" id="seller" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2" placeholder="e.g. Global Supplies">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Product / Service</label>
                        <input type="text" id="product" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2" placeholder="e.g. Industrial Steel Coils">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Amount ($)</label>
                        <input type="number" step="0.01" id="amount" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2" placeholder="e.g. 50000">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Status</label>
                        <select id="status" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                            <option value="Pending">Pending</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white font-medium py-2 px-4 rounded-md hover:bg-indigo-700 transition duration-150">
                        Submit Trade
                    </button>
                </form>
            </div>

            <!-- Trades Table -->
            <div class="bg-white shadow rounded-lg p-6 lg:col-span-2 overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-medium text-gray-900">Recent Trades Ledger</h2>
                    <button onclick="fetchTrades()" class="text-sm text-indigo-600 hover:text-indigo-900 font-medium">Refresh</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Buyer / Seller</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Product</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Amount</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            </tr>
                        </thead>
                        <tbody id="trades-table-body" class="bg-white divide-y divide-gray-200">
                            <!-- Dynamic rows loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript for Data Fetching & Submission -->
    <script>
        const API_URL = '/api/trades';

        async function fetchTrades() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                if (result.message === 'success') {
                    renderTrades(result.data);
                }
            } catch (error) {
                console.error('Error fetching trades:', error);
            }
        }

        function renderTrades(trades) {
            const tbody = document.getElementById('trades-table-body');
            const totalTradesEl = document.getElementById('total-trades');
            const totalValueEl = document.getElementById('total-value');
            
            tbody.innerHTML = '';
            let totalValue = 0;

            if (trades.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-sm text-gray-500">No trades recorded yet.</td></tr>`;
            }

            trades.forEach(trade => {
                totalValue += parseFloat(trade.amount);
                
                let statusBadge = '';
                if (trade.status === 'Completed') {
                    statusBadge = '<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Completed</span>';
                } else if (trade.status === 'Cancelled') {
                    statusBadge = '<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">Cancelled</span>';
                } else {
                    statusBadge = '<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">Pending</span>';
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">#${trade.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <div class="font-medium text-gray-900">${trade.buyer}</div>
                        <div class="text-xs text-gray-400">to ${trade.seller}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${trade.product}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-900">$${parseFloat(trade.amount).toLocaleString()}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">${statusBadge}</td>
                `;
                tbody.appendChild(tr);
            });

            totalTradesEl.innerText = trades.length;
            totalValueEl.innerText = '$' + totalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        document.getElementById('trade-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newTrade = {
                buyer: document.getElementById('buyer').value,
                seller: document.getElementById('seller').value,
                product: document.getElementById('product').value,
                amount: parseFloat(document.getElementById('amount').value),
                status: document.getElementById('status').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(newTrade)
                });

                const result = await response.json();
                if (response.ok) {
                    document.getElementById('trade-form').reset();
                    fetchTrades();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                console.error('Error submitting trade:', error);
                alert('Failed to submit trade.');
            }
        });

        // Initial fetch on load
        fetchTrades();
    </script>
</body>
</html>
