<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Trade Engine SaaS - Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-emerald-400">🚀 B2B Trade Engine SaaS</h1>
            <p class="text-gray-400 mt-2">Live Client Portal & Dashboard</p>
        </header>

        <!-- API Key Box -->
        <div class="bg-gray-800 p-5 rounded-xl shadow-lg mb-6 border border-gray-700">
            <label class="block text-sm font-semibold mb-2 text-gray-300">Enter Your API Key (x-api-key):</label>
            <div class="flex gap-3">
                <input type="text" id="apiKeyInput" value="client_secret_xyz123" class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
                <button onclick="saveApiKey()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-lg font-semibold transition">Save Key</button>
            </div>
        </div>

        <!-- Section 1: Live Assets -->
        <div class="bg-gray-800 p-6 rounded-xl shadow-lg mb-6 border border-gray-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-emerald-400">📈 Live Market Assets</h2>
                <button onclick="fetchAssets()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">Fetch Assets</button>
            </div>
            <div id="assetsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <p class="text-gray-400 text-sm col-span-3">Click 'Fetch Assets' to load live data...</p>
            </div>
        </div>

        <!-- Section 2: Pool Settlement Simulator -->
        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
            <h2 class="text-xl font-bold text-emerald-400 mb-4">⚖️ Pool Settlement Simulator</h2>
            <button onclick="runSettlement()" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition mb-4">Run Sample Settlement</button>
            <pre id="settlementResult" class="bg-gray-900 p-4 rounded-lg text-emerald-300 text-sm overflow-x-auto border border-gray-700">Output will appear here...</pre>
        </div>
    </div>

    <script>
        function getApiKey() {
            return document.getElementById('apiKeyInput').value.trim();
        }

        function saveApiKey() {
            alert('API Key saved for session!');
        }

        // Fetch Live Assets
        async function fetchAssets() {
            const container = document.getElementById('assetsContainer');
            container.innerHTML = '<p class="text-gray-400 text-sm col-span-3">Loading assets...</p>';
            
            try {
                const response = await fetch('/api/v1/engine/assets', {
                    headers: { 'x-api-key': getApiKey() }
                });
                const data = await response.json();

                if (data.success) {
                    container.innerHTML = '';
                    data.assets.forEach(asset => {
                        const trendColor = asset.trend === 'UP' ? 'text-green-400' : 'text-red-400';
                        container.innerHTML += `
                            <div class="bg-gray-900 p-4 rounded-lg border border-gray-700">
                                <h3 class="font-bold text-lg text-white">${asset.name}</h3>
                                <p class="text-2xl font-semibold mt-2 text-emerald-300">$${asset.currentPrice}</p>
                                <p class="text-sm mt-1 font-bold ${trendColor}">Trend: ${asset.trend}</p>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `<p class="text-red-400 col-span-3">Error: ${data.message}</p>`;
                }
            } catch (err) {
                container.innerHTML = `<p class="text-red-400 col-span-3">Failed to connect to server.</p>`;
            }
        }

        // Run Pool Settlement
        async function runSettlement() {
            const resultBox = document.getElementById('settlementResult');
            resultBox.innerText = 'Processing settlement...';

            const sampleTrades = {
                trades: [
                    { userId: "user1", amount: 100, status: "LOST" },
                    { userId: "user2", amount: 200, status: "LOST" },
                    { userId: "user3", amount: 150, status: "WON" },
                    { userId: "user4", amount: 250, status: "WON" }
                ]
            };

            try {
                const response = await fetch('/api/v1/engine/pool/settle', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': getApiKey() 
                    },
                    body: JSON.stringify(sampleTrades)
                });
                const data = await response.json();
                resultBox.innerText = JSON.stringify(data, null, 4);
            } catch (err) {
                resultBox.innerText = 'Failed to process settlement.';
                        }
        }
    </script>
</body>
</html>
